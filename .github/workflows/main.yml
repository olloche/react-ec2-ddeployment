name: Deploy React to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 20.x
    
    - name: Install Dependencies
      run: npm install
    
    - name: Build App
      run: npm run build
    
    - name: Deploy to EC2
      env:
        SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        USER: ${{ secrets.EC2_USER }}
        HOST: ${{ secrets.EC2_HOST }}
      run: |
        echo "$SSH_KEY" > key.pem
        chmod 600 key.pem
        
        # Copy build folder to EC2
        scp -o StrictHostKeyChecking=no -i key.pem -r build $USER@$HOST:~/app/build
        
        # SSH into EC2 and start app
        ssh -o StrictHostKeyChecking=no -i key.pem $USER@$HOST << 'ENDSSH'
        cd ~/app
        npm install -g pm2 serve
        pm2 stop react-app 2>/dev/null || true
        pm2 delete react-app 2>/dev/null || true
        pm2 start "serve -s build -l 3000" --name react-app
        pm2 save
        pm2 list
        ENDSSH
        
        rm key.pem
        echo "✅ Deployment Complete!"